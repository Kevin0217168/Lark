name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'          # 仅当 frontend 目录下文件变化时触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10                # 可根据你的 pnpm 版本调整

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25          # 推荐使用 Node 18+
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Vue project
        working-directory: ./frontend
        run: pnpm run build         # 确保 package.json 中有 build 脚本

      # 将构建产物通过 scp 上传到服务器指定目录
      - name: Copy build to server via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"          # 本地构建产物（相对于工作目录）
          target: "/home/mint/web/lark/frontend"   # 服务器目标目录（注意末尾不要加斜杠）
          strip_components: 1        # 去掉 dist 层级，直接将内部文件放入目标目录
          rm: false                   # 可选：上传前先删除目标目录下的所有文件（慎用）
          target: "/home/mint/web/blog"   # 服务器目标目录（注意末尾不要加斜杠）
          strip_components: 1        # 去掉 dist 层级，直接将内部文件放入目标目录
          rm: true                   # 可选：上传前先删除目标目录下的所有文件（慎用）

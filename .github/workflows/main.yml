name: Deploy Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**'          # 仅当 frontend 目录下文件变化时触发
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10                # 可根据你的 pnpm 版本调整

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25          # 推荐使用 Node 18+
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: Build Vue project
        working-directory: ./frontend
        run: pnpm run build         # 确保 package.json 中有 build 脚本

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete    # 同步并删除远端多余文件
          path: frontend/dist/       # 本地构建输出目录（注意末尾斜杠）
          remote_path: ${{ secrets.REMOTE_TARGET }}   # 服务器上的目标路径
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
